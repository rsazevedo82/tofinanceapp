name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Service role surface check
        run: npm run security:check-service-role-usage

      - name: Unit tests
        run: npm run test:run

      - name: Build (includes TS check)
        run: npm run build

      - name: Precache budget
        env:
          PRECACHE_BUDGET_KB: 5000
        run: npm run pwa:check-precache
